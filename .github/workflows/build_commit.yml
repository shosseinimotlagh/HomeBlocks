name: Build Commit

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      build-type:
        required: true
        type: string
      malloc-impl:
        required: true
        type: string
      compiler:
        required: false
        type: string
        default: 'gcc'
      conan-channel:
        required: false
        type: string
        default: 'dev'
      tooling:
        required: true
        type: string

jobs:
  SislDeps:
    uses: ebay/sisl/.github/workflows/build_dependencies.yml@dev/v14.x
    with:
      branch: dev/v14.x
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: None
    if: ${{ github.event_name != 'pull_request' }}

  NuraftMesgDeps:
    needs: SislDeps
    uses: eBay/nuraft_mesg/.github/workflows/build_dependencies.yml@dev/v5.x
    with:
      branch: dev/v5.x
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: None
    if: ${{ github.event_name != 'pull_request' }}

  IOMgrDeps:
    needs: SislDeps
    uses: eBay/iomanager/.github/workflows/build_dependencies.yml@dev/v13.x
    with:
      branch: dev/v13.x
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: None
    if: ${{ github.event_name != 'pull_request' }}

  UblkppDeps:
    needs: SislDeps
    uses: szmyd/ublkpp/.github/workflows/build_dependencies.yml@main
    with:
      branch: main
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: None
    if: ${{ github.event_name != 'pull_request' }}

  HomeStoreDeps:
    needs: [IOMgrDeps, NuraftMesgDeps]
    uses: eBay/homestore/.github/workflows/build_dependencies.yml@dev/v8.x
    with:
      branch: dev/v8.x
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: None
    if: ${{ github.event_name != 'pull_request' }}

  HomeBlocksDeps:
    needs: [HomeStoreDeps, UblkppDeps]
    uses: ./.github/workflows/build_dependencies.yml
    with:
      branch: ${{ github.ref }}
      platform: ${{ inputs.platform }}
      build-type: ${{ inputs.build-type }}
      malloc-impl: ${{ inputs.malloc-impl }}
      compiler: ${{ inputs.compiler }}
      conan-channel: ${{ inputs.conan-channel }}
      tooling: ${{ inputs.tooling }}
      testing: 'True'
